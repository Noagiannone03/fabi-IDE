<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self';" />
    <link rel="stylesheet" href="rail.css" />
    <title>Fabi Spaces</title>
</head>
<body>
    <!-- Barre de titre : pleine largeur, déplaçable (pour bouger la fenêtre), traffic-lights à gauche. -->
    <header id="topbar" class="topbar">
        <div class="topbar-drag"></div>
        <div class="win-controls" id="winControls" aria-hidden="true">
            <button class="win-btn min" data-act="minimize" title="Réduire" aria-label="Réduire"></button>
            <button class="win-btn max" data-act="maximize" title="Agrandir" aria-label="Agrandir"></button>
            <button class="win-btn close" data-act="close" title="Fermer" aria-label="Fermer"></button>
        </div>
    </header>

    <!-- Colonne des espaces, sous la barre de titre. -->
    <nav id="rail" class="rail" aria-label="Espaces de travail">
        <button class="fox-btn" id="foxBtn" title="Vue d'ensemble des espaces">
            <img src="fox.svg" alt="Fabi" draggable="false" />
        </button>
        <div class="tiles" id="tiles"></div>
        <button class="add-btn" id="addBtn" title="Nouvel espace">
            <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
            </svg>
        </button>
        <div class="rail-spacer"></div>
        <button class="settings-btn" id="settingsBtn" title="Gérer les espaces">
            <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                <circle cx="5" cy="12" r="1.7" fill="currentColor" />
                <circle cx="12" cy="12" r="1.7" fill="currentColor" />
                <circle cx="19" cy="12" r="1.7" fill="currentColor" />
            </svg>
        </button>
    </nav>

    <!-- L'overlay « vue d'ensemble » (le rail passe au premier plan, plein écran). -->
    <div id="overview" class="overview hidden" aria-hidden="true">
        <div class="overview-scrim" id="overviewScrim"></div>
        <section class="overview-panel">
            <header class="overview-head">
                <h1>Espaces</h1>
                <p>Tes bureaux de travail, tous dans une seule fenêtre.</p>
            </header>
            <div class="cards" id="cards"></div>
        </section>
    </div>

    <script src="rail.js"></script>
</body>
</html>
