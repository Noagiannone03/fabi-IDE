<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; img-src 'self' data:; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
    <link rel="stylesheet" href="codicon.css" />
    <link rel="stylesheet" href="rail.css" />
    <title>Fabi Spaces</title>
</head>
<body>
    <nav id="rail" class="rail" aria-label="Espaces de travail">
        <div class="rail-head">
            <button class="fox-btn" id="foxBtn" title="Épingler la barre des espaces">
                <img src="fox.svg" alt="Fabi" draggable="false" />
            </button>
            <span class="rail-title">Mes espaces</span>
        </div>
        <div class="tiles" id="tiles"></div>
        <div class="rail-spacer"></div>
        <button class="add-row" id="addBtn" title="Nouvel espace">
            <span class="plus">
                <svg viewBox="0 0 24 24" width="20" height="20" aria-hidden="true">
                    <path d="M12 5v14M5 12h14" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" />
                </svg>
            </span>
            <span class="add-label">Nouvel espace</span>
        </button>
    </nav>

    <div id="ctxmenu" class="ctxmenu hidden"></div>

    <script src="rail.js"></script>
</body>
</html>
