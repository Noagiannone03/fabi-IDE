<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'none'; font-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self';" />
    <link rel="stylesheet" href="codicon.css" />
    <title>Fabi</title>
    <style>
        @font-face {
            font-family: 'Geist';
            src: url('fonts/Geist-Variable.woff2') format('woff2');
            font-weight: 100 900;
            font-style: normal;
            font-display: swap;
        }
        @font-face {
            font-family: 'Inter';
            src: url('fonts/InterVariable.woff2') format('woff2');
            font-weight: 100 900;
            font-style: normal;
            font-display: swap;
        }
        * { box-sizing: border-box; }
        /* --accent enregistré comme COULEUR typée → il devient INTERPOLABLE : quand
           topbar.js change --accent (switch d'espace), le verre coloré ci-dessous
           transitionne en fondu au lieu de sauter. */
        @property --accent {
            syntax: '<color>';
            inherits: true;
            initial-value: #0A84FF;
        }
        :root { --accent: #0A84FF; }
        html, body {
            margin: 0; width: 100vw; height: 100vh; overflow: hidden;
            font-family: 'Inter', -apple-system, "Segoe UI", Roboto, sans-serif;
            letter-spacing: -0.005em;
            -webkit-font-smoothing: antialiased;
            -webkit-user-select: none; user-select: none; cursor: default;
        }
        body {
            position: relative;
            background: #22262d;
            /* fondu de la teinte d'espace au switch */
            transition: --accent 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* VERRE COLORÉ qui RAYONNE depuis le PILL (le nom de l'espace, ~150px du bord
           sur mac) et se répand à GAUCHE et à DROITE (pas du haut). La couleur de
           l'espace diffuse derrière un « verre dépoli » : ellipse horizontale centrée
           sur le pill, fondue en `screen` sur la barre sombre → vraie lumière colorée.
           Deux couches (cœur net + halo large diffus) → effet riche, pas un dégradé plat. */
        body::before {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background:
                radial-gradient(280px 140% at 150px 50%,
                    color-mix(in oklab, var(--accent) 38%, transparent) 0%,
                    color-mix(in oklab, var(--accent) 14%, transparent) 34%,
                    transparent 66%),
                radial-gradient(560px 240% at 150px 50%,
                    color-mix(in oklab, var(--accent) 12%, transparent) 0%,
                    transparent 60%);
            filter: saturate(1.1) blur(3px);
            opacity: 0.55;
            mix-blend-mode: screen;
            transition: --accent 0.7s cubic-bezier(0.4, 0, 0.2, 1);
        }
        /* Arête de « vitre » : fin reflet clair en haut → l'effet lit comme du verre. */
        body::after {
            content: "";
            position: absolute;
            inset: 0;
            z-index: 0;
            pointer-events: none;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.05), transparent 45%);
        }
        .bar { position: relative; z-index: 1; display: flex; align-items: center; height: 100%; }
        /* Réserve à gauche pour les traffic-lights macOS. */
        .lead { width: 8px; flex: 0 0 auto; height: 100%; -webkit-app-region: drag; }
        body.mac .lead { width: 72px; }
        .toggle {
            -webkit-app-region: no-drag;
            width: 30px; height: 26px; margin: 0 2px;
            border: none; background: transparent; border-radius: 7px;
            cursor: pointer; display: grid; place-items: center;
            color: rgba(243, 236, 230, 0.6);
            transition: background .15s ease, color .15s ease;
        }
        .toggle:hover { background: rgba(255,255,255,0.08); color: #f3ece6; }
        .toggle svg { width: 17px; height: 17px; }
        .toggle .panel { transition: fill .15s ease; }
        body.sb-expanded .toggle { color: #f3ece6; }
        body.sb-expanded .toggle .panel { opacity: 1; }
        /* Îlot-nom de l'espace actif (avec sa couleur). */
        .space-pill {
            -webkit-app-region: no-drag;
            display: inline-flex; align-items: center; gap: 7px;
            height: 24px; margin: 0 4px; padding: 0 11px;
            border-radius: 8px; max-width: 240px;
            background: color-mix(in srgb, var(--accent) 16%, transparent);
            color: #f3ece6; font-size: 12px; font-weight: 600;
            transition: background-color .4s ease;
        }
        .space-pill .badge { display: grid; place-items: center; flex: 0 0 auto; color: var(--accent); }
        .space-pill .badge .codicon { font-size: 14px; }
        .space-pill .dot { width: 8px; height: 8px; border-radius: 50%;
            background: var(--accent); transition: background-color .4s ease; }
        .space-pill .name { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .drag { flex: 1 1 auto; height: 100%; -webkit-app-region: drag; }
        .win-controls { display: none; height: 100%; -webkit-app-region: no-drag; }
        body:not(.mac) .win-controls { display: flex; align-items: center; }
        .win-btn {
            width: 46px; height: 100%; border: none; background: transparent;
            cursor: pointer; display: grid; place-items: center; position: relative;
            color: rgba(243, 236, 230, 0.55);
        }
        .win-btn::before { content: ""; width: 11px; height: 11px; border: 1.4px solid currentColor; border-radius: 2px; }
        .win-btn.min::before { height: 0; border-width: 0 0 1.4px 0; }
        .win-btn.close::before { border: none; width: 14px; height: 14px; transform: rotate(45deg);
            background: linear-gradient(currentColor, currentColor) center/14px 1.4px no-repeat,
                        linear-gradient(currentColor, currentColor) center/1.4px 14px no-repeat; }
        .win-btn:hover { background: rgba(255, 255, 255, 0.07); color: #f3ece6; }
        .win-btn.close:hover { background: #E0413B; color: #fff; }
    </style>
</head>
<body>
    <div class="bar">
        <div class="lead"></div>
        <button class="toggle" id="toggle" title="Déplier / replier la barre des espaces">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <rect x="3" y="4" width="18" height="16" rx="2.5" fill="none" stroke="currentColor" stroke-width="1.7"/>
                <rect class="panel" x="3" y="4" width="7" height="16" rx="2.5" fill="currentColor" opacity="0.85"/>
            </svg>
        </button>
        <div class="space-pill" id="spacePill"><span class="badge" id="spaceBadge"></span><span class="name" id="spaceName"></span></div>
        <div class="drag" id="drag"></div>
        <div class="win-controls" id="winControls">
            <button class="win-btn min" data-act="minimize" aria-label="Réduire"></button>
            <button class="win-btn max" data-act="maximize" aria-label="Agrandir"></button>
            <button class="win-btn close" data-act="close" aria-label="Fermer"></button>
        </div>
    </div>
    <script src="topbar.js"></script>
</body>
</html>
